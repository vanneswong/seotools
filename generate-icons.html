<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>生成插件图标</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    canvas { border: 1px solid #ccc; margin: 10px; }
    .tip { color: #666; font-size: 14px; }
  </style>
</head>
<body>
  <h2>右键点击下面的图标，选择"另存为图片"保存</h2>
  <div class="tip">保存时命名为 icon16.png / icon48.png / icon128.png</div>

  <canvas id="c16" width="16" height="16"></canvas>
  <canvas id="c48" width="48" height="48"></canvas>
  <canvas id="c128" width="128" height="128"></canvas>

  <script>
    function drawIcon(canvasId, size) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');

      // 绿色背景圆角矩形
      ctx.fillStyle = '#4CAF50';
      ctx.beginPath();
      const r = size * 0.15;
      ctx.moveTo(r, 0);
      ctx.lineTo(size - r, 0);
      ctx.quadraticCurveTo(size, 0, size, r);
      ctx.lineTo(size, size - r);
      ctx.quadraticCurveTo(size, size, size - r, size);
      ctx.lineTo(r, size);
      ctx.quadraticCurveTo(0, size, 0, size - r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.fill();

      // SEO 文字
      ctx.fillStyle = 'white';
      ctx.font = `bold ${size * 0.4}px Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('SEO', size / 2, size / 2 + size * 0.05);
    }

    drawIcon('c16', 16);
    drawIcon('c48', 48);
    drawIcon('c128', 128);
  </script>
</body>
</html>
